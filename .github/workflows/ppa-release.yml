name: ppa-release

# Poll upstream tg123/sshpiper for new tags, build a signed Debian source
# package for each target Ubuntu series, and dput it to the Launchpad PPA.
#
# Security posture (see README.md "Release hardening"):
#   * All third-party actions pinned to commit SHAs, never tags.
#   * Minimum `permissions:` per job.
#   * Upload job runs in the `ppa-release` Environment, which requires a
#     manual reviewer approval before secrets are exposed.
#   * Signing key in secrets is a dedicated sign-only SUBKEY (the master
#     key for this PPA identity lives offline). Rotate annually.
#   * GPG import is inline — no third-party key-handling actions.
#
# When bumping an action version, replace the SHA and update the trailing
# `# vX.Y.Z` comment. Resolve with:
#   TAG=$(gh api /repos/OWNER/REPO/releases/latest --jq .tag_name)
#   gh api /repos/OWNER/REPO/commits/"$TAG" --jq .sha
# Verify the commit is GPG-signed by the maintainer before pinning.

on:
  schedule:
    # Poll upstream daily at 06:17 UTC (off-peak, avoids the top of the hour).
    - cron: '17 6 * * *'
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: 'Upstream tag to build (e.g. v1.3.16). Leave blank to auto-detect latest.'
        required: false
        default: ''
      series:
        description: 'Comma-separated Ubuntu series (e.g. noble,resolute).'
        required: false
        default: 'noble,resolute'
      upstream_suffix:
        description: 'Optional suffix on the upstream version (e.g. "+p1") to move past a stuck Launchpad filename slot. Leave blank for normal releases.'
        required: false
        default: ''

# No permissions by default — each job opts in to what it needs.
permissions: {}

concurrency:
  group: ppa-release
  cancel-in-progress: false

jobs:
  detect:
    name: Detect upstream release
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      should_build: ${{ steps.resolve.outputs.should_build }}
      series: ${{ steps.resolve.outputs.series }}
    steps:
      - name: Checkout packaging repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Resolve target tag + series
        id: resolve
        env:
          MANUAL_TAG: ${{ inputs.upstream_tag }}
          MANUAL_SERIES: ${{ inputs.series }}
        run: |
          set -euo pipefail
          if [ -n "${MANUAL_TAG}" ]; then
            TAG="${MANUAL_TAG}"
          else
            # Latest non-prerelease upstream tag. Use the GitHub API with no
            # auth (public repo, 60 req/hr/IP is plenty for a daily poll).
            TAG="$(curl -fsSL \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              https://api.github.com/repos/tg123/sshpiper/releases/latest \
              | jq -r '.tag_name')"
          fi
          echo "Resolved upstream tag: ${TAG}"

          # Split input "noble,resolute" (or just "noble") into an array,
          # trimming whitespace. Empty string -> empty array.
          # Bash fallback (for cron, where inputs are empty) must match the
          # workflow_dispatch default above.
          SERIES="${MANUAL_SERIES:-noble,resolute}"
          IFS=',' read -ra REQUESTED <<< "${SERIES}"

          # Filter to only series that don't yet have a built/<series>/<tag>
          # marker — avoids re-uploading to Launchpad (which would reject as
          # duplicate) and skips work on the matrix leg too.
          TO_BUILD=()
          for raw in "${REQUESTED[@]}"; do
            s="${raw// /}"  # strip spaces
            [ -z "$s" ] && continue
            if git rev-parse -q --verify "refs/tags/built/${s}/${TAG}" >/dev/null; then
              echo "Skipping ${s}: already built for ${TAG}"
            else
              TO_BUILD+=("${s}")
            fi
          done

          # Emit series as a JSON array that the downstream matrix consumes
          # via fromJSON(). Empty array -> should_build=false, no matrix legs.
          if [ ${#TO_BUILD[@]} -eq 0 ]; then
            SERIES_JSON='[]'
            SHOULD=false
          else
            SERIES_JSON=$(printf '%s\n' "${TO_BUILD[@]}" | jq -Rsc 'split("\n") | map(select(length > 0))')
            SHOULD=true
          fi
          echo "To build: ${SERIES_JSON}"

          echo "tag=${TAG}"                 >> "$GITHUB_OUTPUT"
          echo "series=${SERIES_JSON}"      >> "$GITHUB_OUTPUT"
          echo "should_build=${SHOULD}"     >> "$GITHUB_OUTPUT"

  build-and-upload:
    name: Build & upload (${{ matrix.series }})
    needs: detect
    if: needs.detect.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    # Manual approval gate. Secrets only expand inside this environment.
    environment: ppa-release
    permissions:
      contents: write  # needed to push the built/<series>/<tag> marker tag
    strategy:
      fail-fast: false
      matrix:
        series: ${{ fromJSON(needs.detect.outputs.series) }}
    steps:
      - name: Checkout packaging repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install build tooling
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            devscripts debhelper dh-golang golang-go \
            dput-ng gnupg git jq xz-utils ca-certificates \
            distro-info distro-info-data lintian

      - name: Import signing subkey (inline, no third-party action)
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE:  ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEY_ID:      ${{ secrets.GPG_KEY_ID }}
        run: |
          set -euo pipefail
          export GNUPGHOME
          GNUPGHOME="$(mktemp -d)"
          echo "GNUPGHOME=${GNUPGHOME}" >> "$GITHUB_ENV"
          chmod 700 "${GNUPGHOME}"

          # Loopback pinentry so the passphrase can come from stdin.
          cat > "${GNUPGHOME}/gpg.conf" <<'EOF'
          pinentry-mode loopback
          batch
          no-tty
          EOF
          cat > "${GNUPGHOME}/gpg-agent.conf" <<'EOF'
          allow-loopback-pinentry
          allow-preset-passphrase
          EOF

          printf '%s' "${GPG_PRIVATE_KEY}" | gpg --batch --import

          # Sanity: the imported key must contain the expected fingerprint.
          if ! gpg --list-secret-keys --with-colons \
              | awk -F: '$1=="fpr"{print $10}' \
              | grep -qx "${GPG_KEY_ID}"; then
            echo "::error::Imported key does not contain expected fingerprint ${GPG_KEY_ID}" >&2
            exit 1
          fi
          # Mark it ultimately trusted so dpkg-buildpackage will sign.
          echo "${GPG_KEY_ID}:6:" | gpg --import-ownertrust

      - name: Build source package
        env:
          UPSTREAM_TAG:    ${{ needs.detect.outputs.tag }}
          UPSTREAM_SUFFIX: ${{ inputs.upstream_suffix }}
          SERIES:          ${{ matrix.series }}
          PPA_REV:         '1'
          DEBFULLNAME:     'Ryan Lovett'
          DEBEMAIL:        'ryan@pixelated.cloud'
          GPG_KEY_ID:      ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE:  ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail

          # Restart gpg-agent so gpg-agent.conf changes take effect.
          gpgconf --kill gpg-agent

          # Preset the subkey passphrase into gpg-agent's cache so
          # dpkg-buildpackage (→ debsign → gpg) can sign without prompting.
          # Uses the subkey's keygrip, not its fingerprint.
          KEYGRIP=$(gpg --list-secret-keys --with-keygrip --with-colons \
                        "${GPG_KEY_ID}" \
                    | awk -F: '/^ssb:/{f=1;next} f && /^grp:/{print $10; exit}')
          if [ -z "${KEYGRIP}" ]; then
            echo "::error::Could not determine subkey keygrip" >&2
            exit 1
          fi

          PRESET="$(gpgconf --list-dirs libexecdir)/gpg-preset-passphrase"
          printf '%s' "${GPG_PASSPHRASE}" \
            | "${PRESET}" --preset "${KEYGRIP}"

          ./scripts/build-source-package.sh

      - name: Lintian source-package QA
        run: |
          set -euo pipefail
          # Run Debian's own package QA tool against our built .dsc. Launchpad
          # also runs lintian on ingestion, so surfacing issues here avoids
          # uploading something that'll be flagged (or silently rejected)
          # downstream. --info gives human-readable explanations; --display-info
          # lowers the output floor to include "informational" tags too.
          #
          # We don't fail the build on lintian findings today — a handful of
          # informational tags are typical for Go packaging and we haven't
          # triaged them all yet. Review output manually until the set is
          # clean, then drop the `|| true` to enforce.
          lintian --info --display-info build/sshpiperd_*.dsc || true

      - name: Upload source package to Launchpad
        run: |
          set -euo pipefail
          mkdir -p ~/.config/dput-ng/profiles
          cat > ~/.dput.cf <<'EOF'
          [ryanlovett-sshpiperd]
          fqdn = ppa.launchpad.net
          method = ftp
          incoming = ~ryanlovett/ubuntu/sshpiperd/
          login = anonymous
          allow_unsigned_uploads = 0
          EOF
          dput ryanlovett-sshpiperd build/sshpiperd_*_source.changes

      - name: Wait for Launchpad to accept the source
        env:
          SERIES: ${{ matrix.series }}
        run: |
          set -euo pipefail

          # dput just uploads over FTP — Launchpad runs async validation
          # afterwards. An accepted source appears in getPublishedSources;
          # a rejected one never does (rejection comes via email only).
          # Poll until we see it or we time out (→ treat as rejected and
          # fail the job so the marker-tag step doesn't fire).

          CHANGES=$(ls build/sshpiperd_*_source.changes | head -1)
          VERSION=$(awk '/^Version:/{print $2; exit}' "$CHANGES")
          echo "Checking Launchpad for sshpiperd ${VERSION} in ${SERIES}..."

          API='https://api.launchpad.net/1.0/~ryanlovett/+archive/ubuntu/sshpiperd'
          DISTRO="https://api.launchpad.net/1.0/ubuntu/${SERIES}"

          deadline=$(( $(date +%s) + 900 ))  # 15 min total
          delay=15
          while [ "$(date +%s)" -lt "$deadline" ]; do
            # getPublishedSources returns rows in ALL states (Deleted,
            # Superseded, Obsolete too), so filter client-side to the
            # "actually live" statuses.
            active=$(curl -sfL --max-time 20 -G "$API" \
                      --data-urlencode "ws.op=getPublishedSources" \
                      --data-urlencode "source_name=sshpiperd" \
                      --data-urlencode "version=${VERSION}" \
                      --data-urlencode "exact_match=true" \
                      --data-urlencode "distro_series=${DISTRO}" \
                    | jq -r '[.entries[]?
                              | select(.status == "Pending" or .status == "Published")
                             ] | length')
            if [ "${active:-0}" -gt 0 ]; then
              echo "Launchpad accepted ${VERSION} for ${SERIES}."
              exit 0
            fi
            echo "Not yet visible — sleeping ${delay}s"
            sleep "${delay}"
          done

          echo "::error::Launchpad did not publish sshpiperd ${VERSION} for ${SERIES} within the timeout. This usually means the upload was rejected — check the Launchpad email for details. No marker tag will be created, so the workflow can retry once the cause is fixed."
          exit 1

      - name: Record successful upload as a marker tag
        env:
          UPSTREAM_TAG: ${{ needs.detect.outputs.tag }}
          SERIES:       ${{ matrix.series }}
          GH_TOKEN:     ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="built/${SERIES}/${UPSTREAM_TAG}"
          # Create a lightweight tag via the GitHub API — avoids needing
          # persisted git credentials in the workspace for a push.
          gh api --method POST \
            "/repos/${GITHUB_REPOSITORY}/git/refs" \
            -f "ref=refs/tags/${TAG}" \
            -f "sha=${GITHUB_SHA}"

      - name: Scrub GPG material
        if: always()
        run: |
          set -eu
          if [ -n "${GNUPGHOME:-}" ] && [ -d "${GNUPGHOME}" ]; then
            find "${GNUPGHOME}" -type f -exec shred -u {} + || true
            rm -rf "${GNUPGHOME}"
          fi
